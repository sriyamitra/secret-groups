<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Secret Groups</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  /* Styles remain the same as your original provided CSS */
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
    --text: #f0ede8; --muted: #888; --accent: #e8d5a3;
    --accent2: #c9a96e; --success: #5aba8a; --radius: 16px; --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; overflow-x: hidden; }
  .app { width: 100%; max-width: 420px; position: relative; z-index: 1; }
  .screen { display: none; animation: fadeUp 0.35s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  .eyebrow { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; line-height: 1.1; color: var(--text); }
  h2 { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); }
  input[type="text"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 14px 16px; outline: none; margin-bottom: 10px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; padding: 14px 24px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text); cursor: pointer; transition: all 0.18s; width: 100%; }
  .btn-primary { background: var(--accent); color: #1a1408; border-color: var(--accent); }
  .icon-grid { display: grid; gap: 14px; margin: 1.5rem 0; }
  .icon-card { aspect-ratio: 1; background: var(--surface2); border: 1.5px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
  .icon-card.selected { border-color: var(--accent); background: rgba(232,213,163,0.06); }
  .progress-track { height: 3px; background: var(--border); border-radius: 2px; margin: 1.25rem 0; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.5s; }
  .player-list { list-style: none; margin-top: 1rem; }
  .player-item { display: flex; align-items: center; gap: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
  .group-block { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; background: var(--surface); }
  .group-header { display: flex; align-items: center; gap: 14px; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
  .status-dot.done { background: var(--success); }
  .tc-opt { flex: 1; padding: 10px; text-align: center; cursor: pointer; border: 1px solid var(--border); }
  .tc-opt.active { background: var(--accent); color: #000; }
  .team-count-row { display: flex; margin-bottom: 20px; border-radius: 8px; overflow: hidden; }
</style>
</head>
<body>
<div class="app">

  <div id="s-lobby" class="screen active">
    <div class="eyebrow">Secret Groups</div>
    <h1>Pick your side 🎭</h1>
    <br>
    <button class="btn btn-primary" onclick="showScreen('s-create')">Create Room</button>
    <div style="height:10px"></div>
    <button class="btn" onclick="showScreen('s-join')">Join Room</button>
  </div>

  <div id="s-create" class="screen">
    <h2>Setup Game</h2>
    <input type="text" id="org-name" placeholder="Your Name">
    <p class="eyebrow">Number of Teams</p>
    <div class="team-count-row">
        <div class="tc-opt active" onclick="setTeams(2, this)">2</div>
        <div class="tc-opt" onclick="setTeams(3, this)">3</div>
        <div class="tc-opt" onclick="setTeams(4, this)">4</div>
    </div>
    <p class="eyebrow">Total Players</p>
    <input type="text" id="total-p" placeholder="Total players (e.g. 4)" value="4">
    <button class="btn btn-primary" onclick="createRoom()">Start</button>
  </div>

  <div id="s-join" class="screen">
    <h2>Join Game</h2>
    <input type="text" id="join-name" placeholder="Your Name">
    <input type="text" id="join-code" placeholder="4-Letter Code">
    <button class="btn btn-primary" onclick="joinRoom()">Enter</button>
  </div>

  <div id="s-pick" class="screen">
    <h2>Choose a Box</h2>
    <p>Boxes are just to confirm you're ready!</p>
    <div class="icon-grid" id="icon-grid">
        <div class="icon-card" onclick="selectBox(0, this)">?</div>
        <div class="icon-card" onclick="selectBox(1, this)">?</div>
    </div>
    <button class="btn btn-primary" id="confirm-btn" disabled onclick="confirmPick()">I'm Ready</button>
  </div>

  <div id="s-waiting" class="screen">
    <h2 id="wait-code-display">Room: ----</h2>
    <p>Waiting for everyone to join...</p>
    <div class="progress-track"><div class="progress-fill" id="p-bar" style="width:0%"></div></div>
    <ul class="player-list" id="p-list"></ul>
  </div>

  <div id="s-reveal" class="screen">
    <h2>Teams are Ready!</h2>
    <div id="group-results"></div>
    <button class="btn" onclick="location.reload()">New Game</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAnYuqcNYsaGQKaqknsWkaVf0g7MoY8yTQ",
  authDomain: "secret-groups-d15ad.firebaseapp.com",
  databaseURL: "https://secret-groups-d15ad-default-rtdb.firebaseio.com",
  projectId: "secret-groups-d15ad",
  storageBucket: "secret-groups-d15ad.firebasestorage.app",
  messagingSenderId: "452071217507",
  appId: "1:452071217507:web:0f4a0f8f8521ca09b95b56"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myName = "";
let roomCode = "";
let teamCount = 2;
let isOrganizer = false;

window.setTeams = (n, el) => {
    teamCount = n;
    document.querySelectorAll('.tc-opt').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
}

window.showScreen = (id) => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

window.createRoom = async () => {
    myName = document.getElementById('org-name').value;
    const total = parseInt(document.getElementById('total-p').value);
    roomCode = Math.random().toString(36).substring(2,6).toUpperCase();
    isOrganizer = true;
    
    await set(ref(db, 'rooms/' + roomCode), {
        teamCount: teamCount,
        maxPlayers: total,
        revealed: false,
        players: { [myName]: { ready: false } }
    });
    
    localStorage.setItem('room', roomCode);
    localStorage.setItem('name', myName);
    initWaiting();
    showScreen('s-pick');
}

window.joinRoom = async () => {
    myName = document.getElementById('join-name').value;
    roomCode = document.getElementById('join-code').value.toUpperCase();
    
    const snap = await get(ref(db, 'rooms/' + roomCode));
    if(snap.exists()) {
        await update(ref(db, `rooms/${roomCode}/players/${myName}`), { ready: false });
        localStorage.setItem('room', roomCode);
        localStorage.setItem('name', myName);
        initWaiting();
        showScreen('s-pick');
    }
}

window.selectBox = (i, el) => {
    document.querySelectorAll('.icon-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('confirm-btn').disabled = false;
}

window.confirmPick = async () => {
    await update(ref(db, `rooms/${roomCode}/players/${myName}`), { ready: true });
    showScreen('s-waiting');
}

function initWaiting() {
    document.getElementById('wait-code-display').innerText = "Room: " + roomCode;
    onValue(ref(db, 'rooms/' + roomCode), (snap) => {
        const data = snap.val();
        if(!data) return;

        const players = Object.entries(data.players);
        const readyCount = players.filter(p => p[1].ready).length;
        
        // Update Progress UI
        document.getElementById('p-bar').style.width = (readyCount / data.maxPlayers * 100) + "%";
        document.getElementById('p-list').innerHTML = players.map(p => `
            <li class="player-item">
                <div class="status-dot ${p[1].ready ? 'done' : ''}"></div>
                ${p[0]}
            </li>
        `).join('');

        // AUTOMATIC SHUFFLE (When everyone is ready)
        if(readyCount >= data.maxPlayers && !data.revealed) {
            if(isOrganizer) performShuffle(data, players);
        }

        // AUTO-REVEAL (For everyone)
        if(data.revealed) {
            renderResults(data.assignments);
            showScreen('s-reveal');
        }
    });
}

async function performShuffle(data, playerEntries) {
    const playerNames = playerEntries.map(p => p[0]);
    // Fisher-Yates Shuffle
    for (let i = playerNames.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [playerNames[i], playerNames[j]] = [playerNames[j], playerNames[i]];
    }

    const assignments = {};
    const icons = ["🦊 Fox", "🐺 Wolf", "🦅 Eagle", "🐯 Tiger"];
    
    // Distribute players into teams
    playerNames.forEach((name, index) => {
        const teamIndex = index % data.teamCount;
        const teamName = icons[teamIndex];
        if(!assignments[teamName]) assignments[teamName] = [];
        assignments[teamName].push(name);
    });

    await update(ref(db, 'rooms/' + roomCode), { 
        revealed: true,
        assignments: assignments
    });
}

function renderResults(assignments) {
    const container = document.getElementById('group-results');
    container.innerHTML = Object.entries(assignments).map(([team, members]) => `
        <div class="group-block">
            <div class="group-header">
                <strong>Team ${team}</strong>
                <span style="margin-left:auto">${members.length}</span>
            </div>
            <div style="padding:15px">
                ${members.map(m => `<div style="margin-bottom:5px">👤 ${m}</div>`).join('')}
            </div>
        </div>
    `).join('');
}

// Re-connect on refresh
if(localStorage.getItem('room')) {
    roomCode = localStorage.getItem('room');
    myName = localStorage.getItem('name');
    initWaiting();
}
</script>
</body>
</html>
